# ============================================================
# Application Identity
# ============================================================
spring.application.name=inventory-management

# ============================================================
# MySQL Database Configuration
# Change the values below to match your MySQL setup.
# Make sure you have created the database manually:
#   CREATE DATABASE inventory_db;
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# update: creates tables on first run, then alters them if schema changes.
# Use 'create-drop' to recreate tables on every restart (for testing only).
spring.jpa.hibernate.ddl-auto=update

# Shows the generated SQL in the console — useful for debugging
spring.jpa.show-sql=true

# Formats the SQL output to be more readable
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate to use MySQL 8 dialect for proper SQL generation
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# Server Configuration
# ============================================================
server.port=8081

# ============================================================
# Jackson (JSON serialization) Configuration
# ============================================================
# Formats LocalDateTime as a readable string instead of array
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
